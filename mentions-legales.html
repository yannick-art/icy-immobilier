<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentions l&#233;gales &#8212; ICY Immobilier</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.cdnfonts.com/css/clash-display');
*{margin:0;padding:0;box-sizing:border-box}
:root{--pine:#2B5141;--pine-dark:#1e3a2e;--caramel:#C46210;--beige:#EEE8D3;--beige-mid:#e5ddc6;--beige-dark:#d9d0b4;--charcoal:#3E403A;--charcoal-60:#6b6d66;--charcoal-30:#a8a9a4;--charcoal-08:rgba(62,64,58,0.08);--white:#fff;--r-lg:16px;--r-md:10px;--r-sm:8px}
body{font-family:'DM Sans',sans-serif;background:var(--beige);color:var(--charcoal);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased}
nav{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 52px;background:var(--pine);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(238,232,211,0.07)}
.nav-logo{display:flex;align-items:center;cursor:pointer;flex-shrink:0;text-decoration:none}
.nav-center{display:flex;gap:32px}
.nav-center a{font-size:13px;color:rgba(238,232,211,0.55);cursor:pointer;transition:color 0.15s;font-weight:400;letter-spacing:0.02em;text-decoration:none}
.nav-center a:hover{color:var(--beige)}
.nav-cta{font-size:13px;color:var(--caramel);font-weight:500;cursor:pointer;transition:color 0.15s;text-decoration:none}
.nav-burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.nav-burger span{display:block;width:22px;height:2px;background:rgba(238,232,211,0.7);border-radius:2px}
.nav-mobile{display:none;flex-direction:column;background:var(--pine-dark);padding:24px 24px 32px;gap:0;border-top:1px solid rgba(238,232,211,0.07)}
.nav-mobile a{font-size:15px;color:rgba(238,232,211,0.65);padding:14px 0;border-bottom:1px solid rgba(238,232,211,0.06);text-decoration:none;font-weight:400}
.nav-mobile a:last-child{border-bottom:none;color:var(--caramel);margin-top:8px;font-weight:500}
.nav-mobile.open{display:flex}
.hero{background:var(--pine);padding:64px 52px;border-bottom:2px solid var(--caramel)}
.eyebrow{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(238,232,211,0.4);font-weight:600;margin-bottom:16px}
.eyebrow-dot{width:5px;height:5px;border-radius:50%;background:var(--caramel);flex-shrink:0}
h1{font-family:'Clash Display',sans-serif;font-size:40px;font-weight:600;line-height:1.1;color:var(--beige);margin-bottom:12px;letter-spacing:-0.025em}
.hero-sub{font-size:14px;color:rgba(238,232,211,0.45);font-weight:300}
.content{max-width:760px;margin:0 auto;padding:72px 52px}
.ml-section{margin-bottom:52px}
.ml-section:last-child{margin-bottom:0}
.ml-title{font-family:'Clash Display',sans-serif;font-size:22px;font-weight:600;color:var(--pine);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid rgba(43,81,65,0.08);letter-spacing:-0.01em}
.ml-subtitle{font-size:11px;font-weight:700;color:var(--charcoal);margin-bottom:8px;margin-top:20px;text-transform:uppercase;letter-spacing:0.06em}
.ml-text{font-size:14px;color:var(--charcoal-60);line-height:1.85;font-weight:300;margin-bottom:12px}
.ml-text strong{color:var(--charcoal);font-weight:600}
.ml-text a{color:var(--pine);text-decoration:underline}
.ml-box{background:var(--white);border-radius:var(--r-md);border:1px solid var(--charcoal-08);padding:24px 28px;margin-bottom:16px}
.ml-box p{font-size:14px;color:var(--charcoal-60);line-height:1.85;font-weight:300}
.ml-box p strong{color:var(--charcoal);font-weight:600}
.ml-alert{background:var(--beige-mid);border-radius:var(--r-md);border:1px solid var(--beige-dark);padding:20px 24px;margin-top:12px}
.ml-alert p{font-size:13px;color:var(--charcoal-60);line-height:1.8;font-style:italic}
footer{background:var(--charcoal);padding:44px 52px}
.footer-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:24px}
.footer-nav{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.footer-nav a{font-size:12px;color:rgba(238,232,211,0.28);letter-spacing:0.04em;cursor:pointer;transition:color 0.15s;font-weight:400;text-decoration:none}
.footer-nav a:hover{color:rgba(238,232,211,0.68)}
.footer-email{font-size:12px;color:rgba(238,232,211,0.22);font-weight:400;white-space:nowrap}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:24px;border-top:1px solid rgba(238,232,211,0.07);gap:16px}
.footer-baseline{font-family:'Clash Display',sans-serif;font-size:13px;font-style:italic;font-weight:300;color:rgba(238,232,211,0.22)}
.footer-carte{font-size:11px;color:rgba(238,232,211,0.16);letter-spacing:0.04em}
@media(max-width:1024px){nav{padding:0 32px}.hero{padding:52px 32px}.content{padding:56px 32px}footer{padding:36px 32px}}
@media(max-width:768px){nav{padding:0 20px;height:60px}.nav-center,.nav-cta{display:none}.nav-burger{display:flex}.hero{padding:40px 20px}h1{font-size:30px}.content{padding:44px 20px}footer{padding:32px 20px}.footer-top{flex-direction:column;align-items:flex-start;gap:20px}.footer-bottom{flex-direction:column;align-items:flex-start;gap:8px}}

@media(max-width:768px){
nav{position:fixed;top:0;left:0;right:0;height:60px;z-index:200}
body{padding-top:60px}
.nav-mobile{position:fixed;top:60px;left:0;right:0;z-index:199}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 42" height="36"><text x="0" y="28" font-family="'Clash Display', sans-serif" font-size="30" font-weight="600" fill="#EEE8D3" letter-spacing="-1">ICY</text><text x="1" y="40" font-family="'DM Sans', sans-serif" font-size="9" font-weight="300" fill="rgba(238,232,211,0.42)" letter-spacing="3.5">IMMOBILIER</text></svg></a>
  <div class="nav-center">
    <a href="/vendre">Vendre</a>
    <a href="/acheter">Acheter</a>
    <a href="/methode">Notre m&#233;thode</a>
  </div>
      <div class="footer-carte">Carte T &mdash; Meilleurs Biens Immobilier</div>
  </div>
</footer>

</body>
</html>
